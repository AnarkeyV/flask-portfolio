<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css" integrity="sha512-dTfge/zgoMYpP7QbHy4gWMEGsbsdZeCXz7irItjcC3sPUFtf0kuFbDz/ixG7ArTxmDjLXDmezHubeNikyKGVyQ==" crossorigin="anonymous">
        <title>My Scratchpad Page: Log In</title>
        <style>
            body { background-color: #0a192f; color: #a8b2d8; }
            .navbar-inverse { background-color: #112240; border-color: #c9a84c; }
            .navbar-brand { color: #c9a84c !important; font-weight: bold; }
            .navbar-text { color: #a8b2d8 !important; }
            .navbar-text a { color: #c9a84c !important; }

            .login-wrapper {
                max-width: 420px;
                margin: 80px auto;
                background: #112240;
                border: 1px solid rgba(201,168,76,0.25);
                border-top: 3px solid #c9a84c;
                border-radius: 8px;
                padding: 40px;
            }

            .login-title {
                font-size: 1.4rem;
                color: #e6f1ff;
                margin-bottom: 6px;
                font-weight: 600;
            }

            .login-subtitle {
                font-size: 0.88rem;
                color: #8892b0;
                margin-bottom: 28px;
            }

            label {
                font-size: 0.78rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: #c9a84c;
                margin-bottom: 6px;
            }

            .form-control {
                background: #0a192f;
                border: 1px solid rgba(201,168,76,0.25);
                color: #ccd6f6;
                border-radius: 6px;
                padding: 10px 14px;
            }

            .form-control:focus {
                background: #0a192f;
                border-color: #c9a84c;
                box-shadow: 0 0 6px rgba(201,168,76,0.3);
                color: #ccd6f6;
            }

            .form-group { margin-bottom: 20px; }

            .btn-success {
                background-color: #c9a84c;
                border-color: #c9a84c;
                color: #0a192f;
                font-weight: bold;
                width: 100%;
                padding: 10px;
                margin-top: 8px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .btn-success:hover {
                background-color: #f0c96a;
                border-color: #f0c96a;
                color: #0a192f;
            }

            .alert-warning {
                background-color: rgba(201,168,76,0.1);
                border-color: rgba(201,168,76,0.4);
                color: #f0c96a;
                border-radius: 6px;
                margin-bottom: 20px;
            }

            .back-link {
                text-align: center;
                margin-top: 20px;
                font-size: 0.88rem;
            }

            .back-link a { color: #c9a84c; text-decoration: none; }
            .back-link a:hover { color: #f0c96a; text-decoration: underline; }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-inverse">
            <div class="container">
                <div class="navbar-header">
                    <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                        <span class="sr-only">Toggle navigation</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                    <a class="navbar-brand" href="/scratchpad">My Scratchpad</a>
                </div>
                <div class="navbar-text navbar-right" style="margin-right: 15px;">
                    Khairul Rizal &nbsp;|&nbsp;
                    <a href="/">← Back to Portfolio</a>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="login-wrapper">
                <p class="login-title">Welcome back</p>
                <p class="login-subtitle">Log in to post comments on the scratchpad.</p>

                {% if error %}
                    <div class="alert alert-warning" role="alert">
                        Incorrect username or password. Please try again.
                    </div>
                {% endif %}

                <form action="." method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input class="form-control" id="username" name="username" placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-success">Log In</button>
                </form>

                <div class="back-link">
                    <a href="/">← Back to Portfolio</a> &nbsp;·&nbsp; <a href="/scratchpad">View Scratchpad</a>
                </div>
            </div>
        </div>
    </body>
</html>
