apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-portfolio
  labels:
    app: flask-portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-portfolio
  template:
    metadata:
      labels:
        app: flask-portfolio
    spec:
      containers:
      - name: flask-portfolio
        image: kyrizal18/flask-portfolio:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flask-portfolio
spec:
  type: LoadBalancer
  selector:
    app: flask-portfolio
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000